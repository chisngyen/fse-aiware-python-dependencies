version: "3.8"
services:
  cgar-eval:
    image: cgar:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cgar-eval
    privileged: true
    volumes:
      - ../../hard-gists:/gists
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../results/hg2k/pllm:/results:ro
      - ../../results/eval-subsets/cgar-rescue:/output
      - ../memres/src:/memres_src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python run.py --folder /gists
      -d /results -o /output --exact-output
      -m gemma2 -b http://host.docker.internal:11434
      -l 5 -r 0 -w 2 --timeout 400 --resume
      --gist-list /output/sample100_ids.txt
