services:
  cgar-gitchameleon:
    image: cgar:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cgar-gitchameleon
    privileged: true
    volumes:
      - ../../benchmarks/gitchameleon-snippets:/gists
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../results/pllm_results:/results:ro
      - ../../results/cgar_gitchameleon:/output
      - ../memres/src:/memres_src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python run.py --folder /gists
      -d /results -o /output --exact-output
      -m gemma2 -b http://host.docker.internal:11434
      -l 5 -r 0 -w 2 --timeout 400 --resume
