version: "3.8"

services:
  smart-resolver:
    image: smart-resolver:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-resolver
    privileged: true
    volumes:
      - ../../hard-gists:/gists
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../pllm_results:/results:ro
      - ../../output/ablation_no_level1:/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python run.py --folder /gists
      -d /results -o /output --exact-output --no-level1
      -m gemma2 -b http://host.docker.internal:11434
      -l 10 -r 0 -w 1 --timeout 180 --resume
