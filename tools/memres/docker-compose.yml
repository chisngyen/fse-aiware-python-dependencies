version: "3.8"

services:
  memres:
    image: memres:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memres
    privileged: true
    volumes:
      - ../../hard-gists:/gists
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../pllm_results:/results:ro
      - ../../output/run_6:/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python run.py --folder /gists
      -d /results -o /output --exact-output
      -m gemma2 -b http://host.docker.internal:11434
      -l 10 -r 0 -w 2 --timeout 180 --resume
