services:
  memres-gitchameleon:
    image: memres:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memres-gitchameleon
    privileged: true
    volumes:
      - ../../benchmarks/gitchameleon-snippets:/gists
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../results/hg2k/pllm:/results:ro
      - ../../results/gitchameleon/memres:/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python run.py --folder /gists
      -d /results -o /output --exact-output
      -m gemma2 -b http://host.docker.internal:11434
      -l 5 -r 0 -w 2 --timeout 400 --resume
